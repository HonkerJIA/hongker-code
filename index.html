<!DOCTYPE html>
<html>
<head>
    <title>我的第一个待办清单</title>
    <!-- 这里把衣服（CSS）穿上去 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>我的任务清单</h1>
    <!-- 输入框和按钮 -->
    <input type="text" id="taskInput" placeholder="写一个新任务...">
    <button id="addBtn">添加任务</button>

    <!-- 任务列表会显示在这里 -->
    <ul id="taskList">
        <!-- 这里暂时先手动写一个例子看看效果 -->
        <li>给妈妈打电话</li>
        <li>学习HTML</li>
    </ul>

    <!-- 注意：这里先不用Vue，我们用最原始的JS，让你彻底搞懂原理 -->
    <script src="script.js"></script>
</body>
</html>
